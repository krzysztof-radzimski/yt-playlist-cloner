appId: pl.abcpro.yt-playlist-cloner
productName: YT Playlist Cloner
directories:
  output: release
files:
  - out/**
  # Importy `?asset` w procesie głównym wskazują na resources/ względem out/ —
  # katalog musi trafić do paczki.
  - resources/**
asar: true
asarUnpack:
  - resources/**
npmRebuild: false
mac:
  category: public.app-category.utilities
  icon: build/icon.png
  target:
    - dmg
    - zip
win:
  icon: build/icon.png
  target:
    - nsis
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Utility
